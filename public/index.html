<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HANDS Logistics — Driver Dispatch</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#a0d6b4;--green-dk:#5fad8a;
  --dark:#0a0a0a;--card:#161616;--border:#2a2a2a;
  --muted:#666;--label:#999;--body:#e0e0e0;--red:#e05555;
  --input-bg:#1c1c1c;--radius:5px;
}
body{background:var(--dark);color:var(--body);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.app-header{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-wordmark{font-size:13px;font-weight:700;color:#fff;letter-spacing:1px}
.hdr-wordmark span{color:var(--green)}
.hdr-title{font-size:11px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;border-left:1px solid var(--border);padding-left:12px;margin-left:4px}
.workspace{display:grid;grid-template-columns:440px 1fr;flex:1;min-height:calc(100vh - 52px)}
.form-panel{background:var(--card);border-right:1px solid var(--border);padding:20px;overflow-y:auto;height:calc(100vh - 52px);position:sticky;top:52px}
.preview-panel{padding:32px;overflow-y:auto;background:#111}

.sec-hdr{font-size:10px;font-weight:600;color:var(--green);letter-spacing:1.8px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);margin-top:16px}
.sec-hdr:first-child{margin-top:0}
.field{margin-bottom:9px}
.field label{display:block;font-size:10px;color:var(--label);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px;font-weight:500}
.field input,.field select,.field textarea{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--body);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 10px;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green-dk)}
.field input.autofilled{border-color:#3a6b4a;background:#121f18}
.field textarea{resize:vertical;min-height:48px;line-height:1.5}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* PO lookup row */
.po-row{display:flex;gap:6px;align-items:flex-end}
.po-row .field{flex:1;margin-bottom:0}
.po-lookup-btn{flex-shrink:0;background:var(--green-dk);border:none;border-radius:var(--radius);color:#fff;font-size:11px;font-weight:600;padding:7px 12px;cursor:pointer;white-space:nowrap;transition:background .2s;height:32px}
.po-lookup-btn:hover{background:var(--green);color:#0a0a0a}
.po-lookup-btn:disabled{opacity:.4;cursor:default}
.po-status{font-size:10px;margin-top:3px;min-height:14px}
.po-status.ok{color:var(--green)}
.po-status.err{color:var(--red)}
.po-status.loading{color:var(--muted)}

.stop-list{display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.stop-card{background:#181818;border:1px solid var(--border);border-radius:var(--radius);padding:12px;position:relative}
.stop-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.stop-num{font-size:11px;font-weight:600;color:var(--green);font-family:'DM Mono',monospace;letter-spacing:1px}
.stop-client{font-size:10px;color:var(--muted);font-style:italic;margin-left:8px}
.rm-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;line-height:1;opacity:.4;transition:opacity .2s;padding:0 2px}
.rm-btn:hover{opacity:1}

.add-btn{width:100%;background:none;border:1px dashed var(--border);border-radius:var(--radius);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;padding:9px;cursor:pointer;transition:all .2s}
.add-btn:hover{border-color:var(--green-dk);color:var(--green)}
.divider{height:1px;background:var(--border);margin:14px 0}
.btn-primary{width:100%;margin-top:14px;background:var(--green);border:none;border-radius:var(--radius);color:#0a0a0a;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:11px;cursor:pointer;transition:background .2s}
.btn-primary:hover{background:var(--green-dk);color:#fff}
.btn-outline{width:100%;margin-top:7px;background:none;border:1px solid var(--green-dk);border-radius:var(--radius);color:var(--green);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:9px;cursor:pointer;transition:all .2s}
.btn-outline:hover{background:rgba(160,214,180,.08)}
.btn-ghost{width:100%;margin-top:7px;background:none;border:1px solid var(--border);border-radius:var(--radius);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;padding:9px;cursor:pointer;transition:all .2s}
.btn-ghost:hover{border-color:#444;color:var(--body)}

.toast{position:fixed;bottom:20px;right:20px;background:#2d7a55;color:#fff;padding:11px 18px;border-radius:var(--radius);font-size:12px;font-weight:500;opacity:0;transform:translateY(6px);transition:all .3s;pointer-events:none;z-index:999;max-width:320px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{background:var(--red)}

.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(0,0,0,.2);border-top-color:#0a0a0a;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
.spinner-sm{display:inline-block;width:10px;height:10px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── EMAIL PREVIEW ── */
.dispatch-doc{background:#fff;color:#1a1a1a;max-width:680px;margin:0 auto;border-radius:2px;box-shadow:0 4px 40px rgba(0,0,0,.55);font-family:'DM Sans',Helvetica,Arial,sans-serif;font-size:13px;line-height:1.5;overflow:hidden}
.dd-header{background:#0a0a0a;padding:20px 32px 0}
.dd-header-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:16px}
.dd-header-label{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:#a0d6b4;font-weight:700}
.dd-accent{height:3px;background:linear-gradient(90deg,#1a1a1a 68%,#a0d6b4 32%)}
.dd-band{background:#a0d6b4;padding:10px 32px;text-align:center}
.dd-band-text{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#0a0a0a}
.dd-body{padding:28px 32px}
.dd-greeting{font-size:14px;color:#1a1a1a;margin-bottom:20px;line-height:1.7}
.dd-info-band{background:#f5f5f3;border-radius:4px;padding:14px 18px;margin-bottom:20px;display:flex;gap:24px;flex-wrap:wrap}
.dd-info-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#999;margin-bottom:3px}
.dd-info-val{font-size:13px;color:#0a0a0a;font-weight:600}
.dd-stop{margin-bottom:16px;border:1px solid #e0e0e0;border-radius:4px;overflow:hidden}
.dd-stop-header{background:#0a0a0a;padding:10px 18px;display:flex;align-items:center;justify-content:space-between}
.dd-stop-num{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#a0d6b4}
.dd-stop-meta{font-size:10px;color:#666;font-style:italic}
.dd-stop-body{padding:16px 18px}
.dd-stop-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px}
.dd-field-label{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#999;margin-bottom:3px}
.dd-field-val{font-size:12px;color:#1a1a1a;line-height:1.5}
.dd-stop-full{margin-bottom:10px}
.dd-divider{height:1px;background:#ebebeb;margin:10px 0}
.dd-pod-btn{display:inline-block;background:#a0d6b4;color:#0a0a0a;font-family:Helvetica,Arial,sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:9px 18px;border-radius:4px;text-decoration:none;margin-top:4px}
.dd-summary{background:#f5f5f3;border-radius:4px;padding:14px 18px;margin-bottom:24px}
.dd-summary-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#999;margin-bottom:8px}
.dd-summary-row{display:flex;justify-content:space-between;font-size:12px;color:#333;padding:3px 0;border-bottom:1px solid #eee}
.dd-summary-row:last-child{border-bottom:none}
.dd-footer-band{background:#0a0a0a;padding:22px 32px}
.dd-footer-text{font-size:11px;color:#888;line-height:1.7;margin:0}
.dd-footer-text a{color:#a0d6b4;text-decoration:none}
.dd-footer-tagline{font-size:10px;font-style:italic;color:rgba(255,255,255,.35);margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08)}
</style>
</head>
<body>
<div class="app">

<header class="app-header">
  <div class="hdr-logo">
    <span class="hdr-wordmark">H<span>∧</span>NDS</span>
    <div class="hdr-title">Driver Dispatch</div>
  </div>
  <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)" id="dispatch-date"></div>
</header>

<div class="workspace">
  <div class="form-panel">

    <div class="sec-hdr">Dispatch Info</div>
    <div class="field"><label>Driver Name</label><input id="d-driver" type="text" placeholder="Charles Lim" oninput="render()"></div>
    <div class="field"><label>Driver Email</label><input id="d-email" type="email" placeholder="driver@handslogistics.com" oninput="render()"></div>
    <div class="field"><label>Dispatch Date</label><input id="d-date" type="date" oninput="render()"></div>
    <div class="r2">
      <div class="field"><label>Vehicle</label><input id="d-vehicle" type="text" placeholder="Unit 2 — White Sprinter" oninput="render()"></div>
      <div class="field"><label>Dispatcher</label><input id="d-dispatcher" type="text" placeholder="Jon Williams" oninput="render()"></div>
    </div>

    <div class="sec-hdr">Stops</div>
    <div class="stop-list" id="stop-list"></div>
    <button class="add-btn" onclick="addStop()">+ Add Stop</button>

    <div class="divider"></div>
    <button class="btn-primary" onclick="render();showToast('Preview updated')">↻ Refresh Preview</button>
    <button class="btn-outline" id="send-btn" onclick="sendDispatch()">✉ Send Dispatch</button>
    <button class="btn-ghost" onclick="window.print()">⎙ Print / PDF</button>

  </div>
  <div class="preview-panel" id="preview"></div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
const ZAPIER_WEBHOOK = 'https://hooks.zapier.com/hooks/catch/9182863/unrmyhy/';
const POD_BASE       = 'https://handslogistics.netlify.app/?po=';
const MONDAY_TOKEN   = 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjYzNjEzNzc5MSwiYWFpIjoxMSwidWlkIjoxNDk4NzI0NSwiaWFkIjoiMjAyNi0wMy0yMlQxNzoyNTo1MC4wMDBaIiwicGVyIjoibWU6d3JpdGUiLCJhY3RpZCI6NjYxOTgxNSwicmduIjoidXNlMSJ9.RLTGytTbLaran19E20Ag8nzxdaWuwVKVZNx3fdvAIBQ';
const MONDAY_API     = 'https://api.monday.com/v2';
const DEFAULT_PICKUP = '8540 Dean Martin Dr Ste 160, Las Vegas, NV 89139';

let stops = [];
let sid = 0;

function init() {
  const d = new Date();
  document.getElementById('d-date').value = d.toISOString().slice(0,10);
  document.getElementById('dispatch-date').textContent = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  document.getElementById('d-dispatcher').value = 'Jon Williams';
  addStop();
  render();
}

function addStop() {
  sid++;
  stops.push({ id:sid, po:'', client:'', account:'', project:'', pickup:DEFAULT_PICKUP, delivery:'', date:'', timeWindow:'', items:'', instructions:'' });
  renderForm();
  render();
}

function removeStop(id) {
  if (stops.length <= 1) return;
  stops = stops.filter(s => s.id !== id);
  renderForm();
  render();
}

function us(id, key, val) {
  const s = stops.find(s => s.id === id);
  if (s) s[key] = val;
  render();
}

async function lookupPO(stopId) {
  const s = stops.find(s => s.id === stopId);
  if (!s || !s.po.trim()) return;

  const btn  = document.getElementById(`lookup-btn-${stopId}`);
  const stat = document.getElementById(`po-status-${stopId}`);

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-sm"></span>Looking up...';
  stat.textContent = '';
  stat.className = 'po-status loading';

  const query = `{
    items(ids: [${parseInt(s.po)}]) {
      id name
      column_values(ids: ["text","text4","text5","long_text8","text2","text9","long_text","long_text_mm1qb1hz"]) {
        id text
      }
    }
  }`;

  try {
    const res  = await fetch(MONDAY_API, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization': MONDAY_TOKEN, 'API-Version':'2023-04' },
      body: JSON.stringify({ query })
    });
    const json = await res.json();
    const item = json.data?.items?.[0];

    if (!item) throw new Error('Item not found');

    const cols = {};
    (item.column_values || []).forEach(c => { cols[c.id] = c.text || ''; });

    s.client      = cols['text']  || cols['text4'] || '';
    s.account     = cols['text4'] || '';
    s.project     = cols['text5'] || '';
    s.delivery    = cols['long_text8'] || '';
    s.date        = cols['text2'] || '';
    s.timeWindow  = cols['text9'] || '';
    s.items       = cols['long_text'] || '';
    s.instructions= cols['long_text_mm1qb1hz'] || '';

    stat.textContent = `✓ Loaded: ${item.name}`;
    stat.className = 'po-status ok';
    renderForm();
    render();

  } catch(e) {
    stat.textContent = '✗ ' + e.message;
    stat.className = 'po-status err';
  } finally {
    btn.disabled = false;
    btn.textContent = '↻ Lookup';
  }
}

function renderForm() {
  document.getElementById('stop-list').innerHTML = stops.map((s, i) => `
    <div class="stop-card">
      <div class="stop-hdr">
        <div>
          <span class="stop-num">STOP ${String(i+1).padStart(2,'0')}</span>
          ${s.client ? `<span class="stop-client">${esc(s.client)}</span>` : ''}
        </div>
        <button class="rm-btn" onclick="removeStop(${s.id})">×</button>
      </div>

      <div class="field">
        <label>Monday Item ID (PO / Tracking #)</label>
        <div class="po-row">
          <div class="field">
            <input type="text" placeholder="11619683040" value="${esc(s.po)}"
              oninput="us(${s.id},'po',this.value)"
              onkeydown="if(event.key==='Enter'){lookupPO(${s.id})}">
          </div>
          <button id="lookup-btn-${s.id}" class="po-lookup-btn" onclick="lookupPO(${s.id})">↻ Lookup</button>
        </div>
        <div id="po-status-${s.id}" class="po-status ${s.client?'ok':''}">${s.client ? '✓ Loaded: '+esc(s.client) : ''}</div>
      </div>

      <div class="field"><label>Pickup Address</label>
        <input type="text" value="${esc(s.pickup)}" placeholder="${DEFAULT_PICKUP}" oninput="us(${s.id},'pickup',this.value)" class="${s.pickup===DEFAULT_PICKUP&&s.pickup?'autofilled':''}">
      </div>
      <div class="field"><label>Delivery Address</label>
        <input type="text" value="${esc(s.delivery)}" placeholder="Client delivery address..." oninput="us(${s.id},'delivery',this.value)" class="${s.delivery&&s.client?'autofilled':''}">
      </div>
      <div class="r2">
        <div class="field"><label>Delivery Date</label>
          <input type="date" value="${esc(s.date)}" oninput="us(${s.id},'date',this.value)" class="${s.date&&s.client?'autofilled':''}">
        </div>
        <div class="field"><label>Time Window</label>
          <input type="text" placeholder="10:00 AM – 12:00 PM" value="${esc(s.timeWindow)}" oninput="us(${s.id},'timeWindow',this.value)" class="${s.timeWindow&&s.client?'autofilled':''}">
        </div>
      </div>
      <div class="field"><label>Items / Description</label>
        <textarea rows="2" oninput="us(${s.id},'items',this.value)" class="${s.items&&s.client?'autofilled':''}">${esc(s.items)}</textarea>
      </div>
      <div class="field"><label>Special Instructions</label>
        <textarea rows="2" oninput="us(${s.id},'instructions',this.value)" class="${s.instructions&&s.client?'autofilled':''}">${esc(s.instructions)}</textarea>
      </div>
    </div>`).join('');
}

function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}); }
  catch(e) { return d; }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildEmailHTML() {
  const driver     = document.getElementById('d-driver').value || 'Driver';
  const date       = document.getElementById('d-date').value || '';
  const vehicle    = document.getElementById('d-vehicle').value || '';
  const dispatcher = document.getElementById('d-dispatcher').value || 'HANDS Logistics';
  const firstName  = driver.split(' ')[0];

  const stopsHTML = stops.map((s,i) => `
    <div style="margin-bottom:16px;border:1px solid #e0e0e0;border-radius:4px;overflow:hidden;font-family:Helvetica,Arial,sans-serif">
      <div style="background:#0a0a0a;padding:10px 18px;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#a0d6b4">Stop ${String(i+1).padStart(2,'0')}</span>
        <span style="font-size:10px;color:#666">${s.po?'PO# '+esc(s.po):''}${s.client?' · '+esc(s.client):''}</span>
      </div>
      <div style="padding:16px 18px">
        <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:12px">
          <tr>
            <td width="50%" style="vertical-align:top;padding-right:12px">
              <div style="font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#999;margin-bottom:3px">Pickup Address</div>
              <div style="font-size:12px;color:#1a1a1a;line-height:1.5">${esc(s.pickup)||'—'}</div>
            </td>
            <td width="50%" style="vertical-align:top">
              <div style="font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#999;margin-bottom:3px">Delivery Address</div>
              <div style="font-size:12px;color:#1a1a1a;line-height:1.5">${esc(s.delivery)||'—'}</div>
            </td>
          </tr>
          <tr><td colspan="2" style="height:12px"></td></tr>
          <tr>
            <td width="50%" style="vertical-align:top;padding-right:12px">
              <div style="font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#999;margin-bottom:3px">Delivery Date</div>
              <div style="font-size:12px;color:#1a1a1a">${fmtDate(s.date)}</div>
            </td>
            <td width="50%" style="vertical-align:top">
              <div style="font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#999;margin-bottom:3px">Time Window</div>
              <div style="font-size:12px;color:#1a1a1a">${esc(s.timeWindow)||'—'}</div>
            </td>
          </tr>
        </table>
        ${s.items?`<div style="margin-bottom:10px"><div style="font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#999;margin-bottom:3px">Items / Description</div><div style="font-size:12px;color:#1a1a1a;line-height:1.5">${esc(s.items)}</div></div>`:''}
        ${s.instructions?`<div style="height:1px;background:#ebebeb;margin:10px 0"></div><div style="margin-bottom:10px"><div style="font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#999;margin-bottom:3px">⚠ Special Instructions</div><div style="font-size:12px;color:#b45309;font-weight:500;line-height:1.5">${esc(s.instructions)}</div></div>`:''}
        ${s.po?`<div style="height:1px;background:#ebebeb;margin:10px 0"></div><div><div style="font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#999;margin-bottom:6px">POD Upload</div><a href="${POD_BASE}${esc(s.po)}" style="display:inline-block;background:#a0d6b4;color:#0a0a0a;font-family:Helvetica,Arial,sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:9px 18px;border-radius:4px;text-decoration:none">📸 Upload POD Photos →</a></div>`:''}
      </div>
    </div>`).join('');

  const summaryRows = stops.map((s,i) =>
    `<tr><td style="font-size:12px;color:#666;padding:4px 0;border-bottom:1px solid #eee">Stop ${i+1}${s.po?' — PO# '+esc(s.po):''}${s.client?' · '+esc(s.client):''}</td><td style="font-size:12px;color:#0a0a0a;font-weight:600;text-align:right;padding:4px 0;border-bottom:1px solid #eee">${esc(s.delivery)||'TBD'}</td></tr>`
  ).join('');

  return `<!DOCTYPE html><html><head><meta charset="UTF-8"></head>
  <body style="margin:0;padding:24px;background:#f0f0ee;font-family:Helvetica,Arial,sans-serif">
  <div style="background:#fff;max-width:680px;margin:0 auto;border-radius:4px;overflow:hidden;box-shadow:0 2px 20px rgba(0,0,0,.12)">
    <div style="background:#0a0a0a;padding:20px 32px 0">

      </div>
      <div style="height:3px;background:linear-gradient(90deg,#1a1a1a 68%,#a0d6b4 32%)"></div>

    <div style="background:#a0d6b4;padding:10px 32px;text-align:center">

    <div style="padding:28px 32px">
      <p style="font-size:14px;color:#1a1a1a;margin-bottom:20px;line-height:1.7">Hi <strong>${esc(firstName)}</strong>,<br>Here are your dispatched stops. Review all details, follow special instructions, and upload POD photos after each delivery.</p>
      <div style="background:#f5f5f3;border-radius:4px;padding:14px 18px;margin-bottom:24px">
        <table width="100%" cellpadding="0" cellspacing="0"><tr>
          ${driver?`<td style="vertical-align:top;padding-right:20px"><div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#999;margin-bottom:3px">Driver</div><div style="font-size:13px;color:#0a0a0a;font-weight:600">${esc(driver)}</div></td>`:''}
          ${date?`<td style="vertical-align:top;padding-right:20px"><div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#999;margin-bottom:3px">Date</div><div style="font-size:13px;color:#0a0a0a;font-weight:600">${fmtDate(date)}</div></td>`:''}
          ${vehicle?`<td style="vertical-align:top;padding-right:20px"><div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#999;margin-bottom:3px">Vehicle</div><div style="font-size:13px;color:#0a0a0a;font-weight:600">${esc(vehicle)}</div></td>`:''}

      </div>
      <p style="font-size:12px;color:#666;line-height:1.7">Questions on route? Contact dispatch: <a href="mailto:concierge@handslogistics.com" style="color:#5fad8a">concierge&#64;handslogistics.com</a> · <strong style="color:#1a1a1a">+1 (312) 206-6193</strong></p>
    </div>
    <div style="background:#0a0a0a;padding:22px 32px">
      <p style="font-size:11px;color:#888;line-height:1.7;margin:0">HANDS Logistics · 8540 Dean Martin Dr Ste 160, Las Vegas NV 89139<br>
      <a href="mailto:concierge@handslogistics.com" style="color:#a0d6b4;text-decoration:none">concierge&#64;handslogistics.com</a> · <a href="https://www.handslogistics.com" style="color:#a0d6b4;text-decoration:none">HANDSLogistics.com</a></p>
      <p style="font-size:10px;font-style:italic;color:rgba(255,255,255,.35);margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08)">Events and Production. In Better HANDS.</p>

}

function render() {
  const driver     = document.getElementById('d-driver').value || 'Driver';
  const date       = document.getElementById('d-date').value || '';
  const vehicle    = document.getElementById('d-vehicle').value || '';
  const dispatcher = document.getElementById('d-dispatcher').value || '';

  const stopsHTML = stops.map((s,i) => `
    <div class="dd-stop">
      <div class="dd-stop-header">
        <span class="dd-stop-num">Stop ${String(i+1).padStart(2,'0')}</span>
        <span class="dd-stop-meta">${s.po?'PO# '+esc(s.po):''}${s.client?' · '+esc(s.client):''}</span>
      </div>
      <div class="dd-stop-body">
        <div class="dd-stop-grid">
          <div><div class="dd-field-label">Pickup</div><div class="dd-field-val">${esc(s.pickup)||'—'}</div></div>
          <div><div class="dd-field-label">Delivery</div><div class="dd-field-val">${esc(s.delivery)||'—'}</div></div>
          <div><div class="dd-field-label">Date</div><div class="dd-field-val">${fmtDate(s.date)}</div></div>
          <div><div class="dd-field-label">Time Window</div><div class="dd-field-val">${esc(s.timeWindow)||'—'}</div></div>
        </div>
        ${s.items?`<div class="dd-stop-full"><div class="dd-field-label">Items</div><div class="dd-field-val">${esc(s.items)}</div></div>`:''}
        ${s.instructions?`<div class="dd-divider"></div><div class="dd-stop-full"><div class="dd-field-label">⚠ Instructions</div><div class="dd-field-val" style="color:#b45309;font-weight:500">${esc(s.instructions)}</div></div>`:''}
        ${s.po?`<div class="dd-divider"></div><a href="${POD_BASE}${esc(s.po)}" target="_blank" class="dd-pod-btn">📸 Upload POD →</a>`:''}
      </div>
    </div>`).join('');

  document.getElementById('preview').innerHTML = `
    <div class="dispatch-doc">
      <div class="dd-header">
        <div class="dd-header-row">
          <span style="color:#fff;font-size:15px;font-weight:700;letter-spacing:1px">HANDS LOGISTICS</span>
          <span class="dd-header-label">Driver Dispatch</span>
        </div>
        <div class="dd-accent"></div>
      </div>
      <div class="dd-band"><span class="dd-band-text">Stops for ${fmtDate(date)||'today'} — ${stops.length} stop${stops.length!==1?'s':''}</span></div>
      <div class="dd-body">
        <p class="dd-greeting">Hi <strong>${esc(driver.split(' ')[0])}</strong>,<br>Here are your dispatched stops. Upload POD photos after each delivery.</p>
        <div class="dd-info-band">
          ${driver?`<div><div class="dd-info-label">Driver</div><div class="dd-info-val">${esc(driver)}</div></div>`:''}
          ${date?`<div><div class="dd-info-label">Date</div><div class="dd-info-val">${fmtDate(date)}</div></div>`:''}
          ${vehicle?`<div><div class="dd-info-label">Vehicle</div><div class="dd-info-val">${esc(vehicle)}</div></div>`:''}
          ${dispatcher?`<div><div class="dd-info-label">Dispatcher</div><div class="dd-info-val">${esc(dispatcher)}</div></div>`:''}
        </div>
        ${stopsHTML}
      </div>
      <div class="dd-footer-band">
        <p class="dd-footer-text">HANDS Logistics · concierge&#64;handslogistics.com · +1 (312) 206-6193</p>
        <p class="dd-footer-tagline">Events and Production. In Better HANDS.</p>
      </div>
    </div>`;
}

async function sendDispatch() {
  const driver = document.getElementById('d-driver').value.trim();
  const email  = document.getElementById('d-email').value.trim();
  const date   = document.getElementById('d-date').value;
  if (!email)  { showToast('Enter driver email first', true); return; }
  if (!driver) { showToast('Enter driver name first', true); return; }

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Sending…';

  try {
    const emailHTML    = buildEmailHTML();
    const stopsSummary = stops.map((s,i) => `Stop ${i+1}: ${s.delivery||'TBD'}${s.po?' (PO# '+s.po+')':''}`).join(' | ');
    const dateLabel    = date ? new Date(date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : 'Today';

    await fetch(ZAPIER_WEBHOOK, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'driver_dispatch',
        to: email,
        cc: 'concierge@handslogistics.com',
        subject: `HANDS Dispatch — ${driver} — ${dateLabel} — ${stops.length} Stop${stops.length!==1?'s':''}`,
        html_body: emailHTML,
        driver, driver_email: email,
        dispatch_date: date,
        stop_count: stops.length,
        stops_summary: stopsSummary,
        stops, sent_at: new Date().toISOString()
      })
    });

    btn.innerHTML = '✓ Dispatched';
    showToast(`✓ Dispatch sent to ${driver}`);
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '✉ Send Dispatch';
    showToast('Send failed: ' + e.message, true);
  }
}

function showToast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err?' err':'');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className='toast', 3500);
}

init();
</script>
